<script>
  (function() {
    // 1. 세션 스토리지 값 확인 (문자열 'true'인지 정확히 비교)
    const splashSeen = sessionStorage.getItem('splashSeen');

    console.log('현재 스플래시 상태:', splashSeen);

    // 2. 'true'가 아닐 때만 splash.html로 이동
    if (splashSeen !== 'true') {
      console.log('스플래시를 보지 않음 -> 이동 중...');
      location.replace('splash.html');
    } else {
      console.log('스플래시 이미 봄 -> 메인 유지');
    }
  })();
</script>
